<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3D Конструктор самолетов ✈️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="top-right-area">
    <div id="mode-indicator">🛠️ СБОРКА</div>
    <button id="view-btn" style="display:none;">📷 Сзади</button>
  </div>
  <div id="ui">
    <div class="panel">
      <button class="part-btn active" id="btn-wing">🪽<span>Крыло</span></button>
      <button class="part-btn" id="btn-tail">🪁<span>Хвост</span></button>
      <button class="part-btn" id="btn-engine">🚀<span>Двиг</span></button>
    </div>
    <button class="action-btn" id="fly-btn">✈️ ВЗЛЕТ</button>
    <button class="action-btn reset-btn" id="reset-btn">🔄</button>
  </div>
  <div id="nudge-controls" style="display:none;">
    <div class="nudge-row"><span class="nudge-label">↕️</span><button class="nudge-btn" data-axis="y" data-dir="1">↑Y</button><button class="nudge-btn" data-axis="y" data-dir="-1">↓Y</button></div>
    <div class="nudge-row"><span class="nudge-label">↔️</span><button class="nudge-btn" data-axis="x" data-dir="1">→X</button><button class="nudge-btn" data-axis="x" data-dir="-1">←X</button></div>
    <div class="nudge-row"><span class="nudge-label">🔃</span><button class="nudge-btn" data-axis="z" data-dir="1">↑Z</button><button class="nudge-btn" data-axis="z" data-dir="-1">↓Z</button></div>
  </div>
  <div class="instructions" id="instr">👆 Тап по фюзеляжу: деталь | Тап по детали: выделить | ✌️: вращать</div>
  <div id="version-panel">
    <div id="version-badge">v1.0.4</div>
    <div id="changelog-popup" style="display:none;">
      <div class="changelog-title">📋 История обновлений</div>
      <div class="changelog-list" id="changelog-list"></div>
    </div>
  </div>
  <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }</script>
  <script type="module" src="app.js"></script>
</body>
</html>
